<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1400" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="420" rx="28" fill="url(#bg2)"/>

  <text x="60" y="70" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">
    End-to-End Product Pipeline
  </text>
  <text x="60" y="105" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    From raw question paper to visual analysis and generated exam output
  </text>

  <rect x="60" y="165" width="220" height="150" rx="24" fill="white" stroke="#BFDBFE" stroke-width="2"/>
  <rect x="325" y="165" width="220" height="150" rx="24" fill="white" stroke="#BFDBFE" stroke-width="2"/>
  <rect x="590" y="165" width="220" height="150" rx="24" fill="white" stroke="#BFDBFE" stroke-width="2"/>
  <rect x="855" y="165" width="220" height="150" rx="24" fill="white" stroke="#FED7AA" stroke-width="2"/>
  <rect x="1120" y="165" width="220" height="150" rx="24" fill="white" stroke="#FED7AA" stroke-width="2"/>

  <rect x="90" y="190" width="76" height="14" rx="7" fill="url(#blue)"/>
  <rect x="355" y="190" width="76" height="14" rx="7" fill="url(#blue)"/>
  <rect x="620" y="190" width="76" height="14" rx="7" fill="url(#blue)"/>
  <rect x="885" y="190" width="76" height="14" rx="7" fill="url(#orange)"/>
  <rect x="1150" y="190" width="76" height="14" rx="7" fill="url(#orange)"/>

  <text x="90" y="236" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Upload
  </text>
  <text x="90" y="267" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Student uploads a PDF
  </text>
  <text x="90" y="291" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    or previous question paper
  </text>

  <text x="355" y="236" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Extract
  </text>
  <text x="355" y="267" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Backend reads PDF text
  </text>
  <text x="355" y="291" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    using pdfplumber
  </text>

  <text x="620" y="236" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Parse
  </text>
  <text x="620" y="267" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Sections, marks, and
  </text>
  <text x="620" y="291" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    question patterns are stored
  </text>

  <text x="885" y="236" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Visualize
  </text>
  <text x="885" y="267" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Dashboard charts and
  </text>
  <text x="885" y="291" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    blueprint insights render
  </text>

  <text x="1150" y="236" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Generate
  </text>
  <text x="1150" y="267" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Groq creates new section-
  </text>
  <text x="1150" y="291" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    wise predicted questions
  </text>

  <path d="M280 240H325" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <path d="M545 240H590" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <path d="M810 240H855" stroke="#F97316" stroke-width="4" stroke-linecap="round"/>
  <path d="M1075 240H1120" stroke="#F97316" stroke-width="4" stroke-linecap="round"/>

  <circle cx="302" cy="240" r="4" fill="#2563EB"/>
  <circle cx="567" cy="240" r="4" fill="#2563EB"/>
  <circle cx="832" cy="240" r="4" fill="#F97316"/>
  <circle cx="1097" cy="240" r="4" fill="#F97316"/>
</svg>
